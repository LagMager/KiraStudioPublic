# Tooltips generales
LanguageTooltip=Idioma usado en toda la app.\n\nLas localizaciones son contribuidas por usuarios, por lo que algunas cadenas que aún no han sido actualizadas pueden aparecer en inglés.\n\n¡Si quieres ayudar a traducir KiraStudio, visítanos en Discord!
CheckUpdatesTooltip=Al activarse, KiraStudio buscará actualizaciones cada vez que inicies la app.
ShowTutorialTooltip=Al activarse, el tutorial inicial se mostrará la próxima vez que se inicie la app.
ClearUndoRedoTooltip=Al activarse, la pila de deshacer/rehacer se limpiará cada vez que guardes. Activar esto puede ayudar a reducir el uso de memoria.
