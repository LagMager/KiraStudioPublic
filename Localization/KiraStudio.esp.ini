LocalizedDescriptions_0=Un ajuste de volumen simple. A diferencia del volumen del canal que se aplica después de todos los efectos del canal, este puede colocarse en cualquier parte de la lista de efectos.
LocalizedDescriptions_1=Un ajuste de balance estéreo simple. A diferencia del balance del canal que se aplica después de todos los efectos del canal, este puede colocarse en cualquier parte de la lista de efectos.
LocalizedDescriptions_2=Una colección de filtros versátiles (pasa-bajos, pasa-altos, pasa-banda, notch, etc.) diseñados para moldear, atenuar o enfatizar selectivamente rangos de frecuencia específicos de la señal de audio.
LocalizedDescriptions_3=Un ecualizador paramétrico de tres bandas con controles de graves, medios y agudos, que ofrece opciones avanzadas para ajustar la frecuencia y resonancia (Q) de cada banda para una conformación tonal precisa.
LocalizedDescriptions_4=El Freeverb original de Jezar en Dreampoint. La comunidad de audio está eternamente agradecida por su increíble contribución.
LocalizedDescriptions_5=Un efecto de coro estéreo de tres fases que engrosa y amplía el sonido, añadiendo movimiento sutil, profundidad y textura espacial exuberante.
LocalizedDescriptions_6=Un efecto de retraso flexible con modos mono, cruzado y ping-pong, con un filtro pasa-bajos opcional para suavizar los ecos repetidos para un sonido pulido y espacioso.
LocalizedDescriptions_7=Un efecto bit crusher que degrada intencionalmente el audio reduciendo la profundidad de bits y la frecuencia de muestreo, produciendo texturas granulosas, lo-fi y digitalmente distorsionadas.
