LocalizedDescriptions_0=Una forma de onda sierra genérica con pasos y dirección configurables, ideal para leads brillantes, bajos ricos y sonidos armónicamente complejos típicos de la síntesis sustractiva.
LocalizedDescriptions_1=Una forma de onda de pulso genérica con ciclo de trabajo ajustable con precisión, perfecta para melodías claras, armonías ricas y tonos clásicos de chiptune con brillo y carácter ajustables.
LocalizedDescriptions_2=Una forma de onda triangular genérica que puede suavizarse o escalonarse, perfecta para bajos suaves, leads delicados y tonos limpios y redondeados con armónicos mínimos.
LocalizedDescriptions_3=Una forma de onda sinusoidal genérica que produce un tono puro sin armónicos, ideal para sub-bajos, leads suaves y modulación limpia o capas en síntesis.
LocalizedDescriptions_4=Un sintetizador FM genérico de 2 operadores inspirado en los chips clásicos de Yamaha, que ofrece más control sobre algoritmos, modulación y formas de onda personalizadas más allá de simples senos para diseño de sonido profundo.
LocalizedDescriptions_5=Un sintetizador FM genérico de 3 operadores inspirado en los chips clásicos de Yamaha, que ofrece más control sobre algoritmos, modulación y formas de onda personalizadas más allá de simples senos para diseño de sonido profundo.
LocalizedDescriptions_6=Un sintetizador FM genérico de 4 operadores inspirado en los chips clásicos de Yamaha, que ofrece más control sobre algoritmos, modulación y formas de onda personalizadas más allá de simples senos para diseño de sonido profundo.
LocalizedDescriptions_7=Un sintetizador de tabla de ondas genérico que usa formas de onda de 4 a 8 bits, capaz de ciclar por múltiples tablas a una velocidad fija para sonidos evolutivos, dinámicos y texturizados.
LocalizedDescriptions_8=Un sintetizador PCM (modulación por código de pulso) genérico. Asigna samples PCM a las teclas del piano y opcionalmente extiéndelas sobre un rango para que suban/bajen de tono automáticamente. Hay un filtro opcional disponible (pasa-bajos, pasa-altos, pasa-banda, notch).
LocalizedDescriptions_9=Un generador de sonido de 8 bits programable de enteros genérico, similar al Bytebeat de Viznut y al sintetizador de 8 bits de Caustic. Ingresa una función personalizada que toma el tiempo actual (t) como entrada y emite un valor de amplitud en el rango 0-255. También se proporciona una variable adicional (x) que puede automatizarse.
LocalizedDescriptions_10=Un sintetizador SoundFont genérico compatible con SF2 y SF3 (comprimido con OGG/Vorbis). Los moduladores solo se evalúan al activar la tecla y los efectos de coro/reverb se ignoran intencionalmente, ya que puedes añadirlos tú mismo. Se incluye una versión SF3 integrada de 'GeneralUser-GS' de S. Christian Collins. Por favor apoya su increíble trabajo.

LocalizedDescriptions_11=Un canal FM OPLL. El OPLL es un chip FM económico para MSX-Music y el Master System japonés. Proporciona voces simples de 2 operadores con instrumentos preestablecidos más una voz personalizable. Sonido compacto y reconocible de "FM barato".
LocalizedDescriptions_12=Un canal FM OPN2. El OPN2 es el chip FM principal del Sega Mega Drive/Genesis. Ofrece síntesis FM expresiva de 4 operadores, con algoritmos flexibles y carácter cálido y crujiente de su DAC integrado.
LocalizedDescriptions_13=Un canal FM OPL2. El OPL2 se encuentra en las AdLib y las primeras tarjetas Sound Blaster. FM básico de 2 operadores, múltiples formas de onda, efectos de trémolo/vibrato y modo de percusión para música de juegos de DOS.
LocalizedDescriptions_14=Un canal FM OPL3. El OPL3 es el sucesor del OPL2, presente en Sound Blaster 16 y otros. Ofrece paneo estéreo, formas de onda adicionales y voces de 4 operadores, definiendo las ricas bandas sonoras de la era DOS.
LocalizedDescriptions_15=Un canal generador de sonido controlado por software YM2149 con soporte de tono, ruido y envolvente. Ampliamente usado en computadoras y consolas de los años 80 como el Atari ST. Similar a los diversos chips AY.
LocalizedDescriptions_16=Un canal ADPCM A/B OPNA. Solo tiene capacidades de reproducción de samples sin FM ni SSG. Puede usarse para reproducir samples arbitrarios o cargar los famosos 6 sonidos de percusión disponibles en algunas ROMs.

LocalizedDescriptions_17=Un canal de pulso 2A03 del NES/Famicom. Produce una onda de pulso rica con ciclo de trabajo variable y tono, ideal para melodías. El período es de 11 bits y el volumen de 4 bits. Esta app no emula las interacciones de volumen entre los 2 canales cuadrados del NES.
LocalizedDescriptions_18=Un canal triangular 2A03 del NES/Famicom. Genera una onda triangular escalonada, usada frecuentemente para líneas de bajo o percusión. El período es de 11 bits y no tiene control de volumen. Por supuesto, puedes ajustar el volumen en el canal o más adelante en la cadena de efectos. Esta app no emula las interacciones de volumen triángulo/ruido/DMC del NES.
LocalizedDescriptions_19=Un canal de ruido 2A03 del NES/Famicom. Produce 16 tonos de ruido blanco diferentes, perfecto para crear sonidos de batería y efectos de sonido. También tiene modos adicionales para sonar más metálico. Esta app no emula las interacciones de volumen triángulo/ruido/DMC del NES.
LocalizedDescriptions_20=Un canal DPCM de 1 bit 2A03 del NES/Famicom. Asigna samples DPCM a las teclas del piano y úsalas en tus canciones. Los samples pueden bajarse de tono con un conjunto fijo de 16 frecuencias (solo NTSC) y pueden no estar siempre afinadas. Esta app no emula las interacciones de volumen triángulo/ruido/DMC del NES.
LocalizedDescriptions_21=Un canal PCM de 7 bits 2A03 del NES/Famicom. Los samples pueden bajarse y subirse ligeramente de tono y pueden no estar siempre afinadas cuando se transponen. Esta app no emula las interacciones de volumen triángulo/ruido/DMC del NES.
LocalizedDescriptions_22=Un canal de tabla de ondas del Famicom Disk System con forma de onda y tabla de modulación ajustables, que permite tonos más ricos, efectos de vibrato y timbres evolutivos complejos más allá del audio estándar del NES.
LocalizedDescriptions_23=Un canal de pulso VRC6 de Konami. Con su período de 12 bits y ciclos de trabajo adicionales, es más expresivo que las cuadradas estándar del NES.
LocalizedDescriptions_24=Un canal de sierra VRC6 de Konami. Genera una onda sierra característica de 7 pasos, ideal para líneas de bajo ricas y leads zumbantes poco comunes en el hardware estándar del NES.
LocalizedDescriptions_25=Un canal FM VRC7 de Konami basado en el Yamaha YM2413, capaz de producir tonos ricos, metálicos y expresivos que recuerdan a instrumentos reales y texturas de sintetizador complejas.
LocalizedDescriptions_26=Un canal Sunsoft 5B basado en el Yamaha YM2149, capaz de generar tanto tono como ruido, lo que permite un diseño de sonido versátil melódico y percusivo.
LocalizedDescriptions_27=Un canal de tabla de ondas Namco 163 capaz de formas de onda de 4 bits personalizadas, que permite timbres ricos y evolutivos y texturas polifónicas complejas poco comunes en otras expansiones del Famicom.

LocalizedDescriptions_28=Un canal cuadrado del Game Boy que genera ondas de pulso con ciclos de trabajo variables, usado para melodías, armonías y leads clásicos de chiptune.
LocalizedDescriptions_29=Un canal de ruido del Game Boy que produce ruido blanco o periódico, ideal para percusión, hi-hats y efectos de sonido.
LocalizedDescriptions_30=Un canal de onda del Game Boy que reproduce formas de onda personalizadas de 4 bits, permitiendo timbres únicos, tonos de bajo y texturas similares a samples poco comunes en otras consolas portátiles.

