[TutorialDialog]

# Escritorio
TutorialMessages_0=(1/10) ¡Bienvenido a <f8bbd0|KiraStudio>! Dediquemos unos segundos a revisar algunos de los controles básicos para asegurar que uses la app al máximo.
TutorialMessages_1=(2/10) Para <f8bbd0|desplazarte> por las distintas vistas, <f8bbd0|mantén presionado el botón central del ratón> y arrastra. También puedes usar las <f8bbd0|barras de desplazamiento>.
TutorialMessages_2=(3/10) Para <f8bbd0|ampliar y reducir el zoom> en la mayoría de vistas, <f8bbd0|gira la rueda del ratón>. También puedes <f8bbd0|hacer zoom verticalmente> haciendo lo mismo en el piano o la escala de la izquierda, según la vista.
TutorialMessages_3=(4/10) Si estás en un <f8bbd0|trackpad o laptop>, <f8bbd0|activa los controles de trackpad> en la configuración. Esto te permitirá usar <f8bbd0|gestos de deslizamiento y pellizco para zoom>.
TutorialMessages_4=(5/10) Para <f8bbd0|agregar> cosas como patrones y notas, <f8bbd0|haz clic con el botón izquierdo del ratón> en un espacio vacío.
TutorialMessages_5=(6/10) Para <f8bbd0|eliminar> cosas como patrones y notas, <f8bbd0|haz doble clic con el botón izquierdo del ratón>.
TutorialMessages_6=(7/10) <f8bbd0|Hacer clic derecho> en los elementos generalmente abrirá un <f8bbd0|menú contextual> con más opciones. ¡Haz clic derecho en todo lo que veas para descubrir qué puede hacer la app!
TutorialMessages_7=(8/10) <f8bbd0|Hacer clic derecho> en la mayoría de los controles deslizantes numéricos del Explorador de proyectos te permitirá <f8bbd0|automatizar parámetros de varias maneras>.
TutorialMessages_8=(9/10) Mantén siempre un ojo en las <f8bbd0|sugerencias> en la esquina superior derecha. Cambian constantemente a medida que mueves el ratón y ¡te enseñarán cómo usar la app! Para la <f8bbd0|documentación> completa incluyendo <f8bbd0|tutoriales en video>, haz clic en el gran <f8bbd0|signo de interrogación>.
TutorialMessages_9=(10/10) ¡Únete a nosotros en <f8bbd0|Discord>! Conoce a otros usuarios, comparte tus canciones, reporta bugs y prueba versiones beta. ¡Enlace en la documentación!

# Móvil
TutorialMessages_0_Mobile=(1/11) ¡Bienvenido a <f8bbd0|KiraStudio>! Dediquemos unos segundos a revisar algunos de los controles básicos para asegurar que uses la app al máximo.
TutorialMessages_1_Mobile=(2/11) Para <f8bbd0|desplazarte> por las distintas vistas, simplemente <f8bbd0|desliza> decisivamente.
TutorialMessages_2_Mobile=(3/11) Para <f8bbd0|ampliar y reducir el zoom> en la mayoría de vistas, <f8bbd0|pellizca con 2 dedos>.
TutorialMessages_3_Mobile=(4/11) Para <f8bbd0|agregar> cosas como patrones y notas, <f8bbd0|toca> en un espacio vacío.
TutorialMessages_4_Mobile=(5/11) Para <f8bbd0|seleccionar> cosas como patrones y notas, <f8bbd0|presiona largo>, espera a que aparezca el <f8bbd0|círculo pulsante>, luego <f8bbd0|comienza a mover tu dedo>.
TutorialMessages_5_Mobile=(6/11) <f8bbd0|Presionar largo> en los elementos generalmente abrirá un <f8bbd0|menú contextual> con más opciones. ¡Pruébalo en todo lo que veas para descubrir qué puede hacer la app!
TutorialMessages_6_Mobile=(7/11) <f8bbd0|Presionar largo> en la mayoría de los controles deslizantes numéricos del Explorador de proyectos te permitirá <f8bbd0|automatizar parámetros de varias maneras>. Una forma rápida de abrir el Explorador de proyectos es <f8bbd0|tocar dos veces> en el nombre de un canal.
TutorialMessages_7_Mobile=(8/11) En cuanto a los <f8bbd0|controles deslizantes>, puedes cambiar a <f8bbd0|desplazamiento de precisión> para mayor exactitud <f8bbd0|moviendo tu dedo arriba o abajo> del control deslizante mientras cambias el valor.
TutorialMessages_8_Mobile=(9/11) Para la <f8bbd0|documentación> completa incluyendo <f8bbd0|tutoriales en video>, haz clic en el gran <f8bbd0|signo de interrogación>.
TutorialMessages_9_Mobile=(10/11) Usar <f8bbd0|Bluetooth> añade mucha <f8bbd0|latencia de audio> (retraso en el audio). Lamentablemente la app no puede hacer nada al respecto. Se recomiendan auriculares o altavoces con cable.
TutorialMessages_10_Mobile=(11/11) ¡Únete a nosotros en <f8bbd0|Discord>! Conoce a otros usuarios, comparte tus canciones, reporta bugs y prueba versiones beta. ¡Enlace en la documentación!

